<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AussieMart — Online Groceries</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">🛒 Aussie<span>Mart</span></div>
      <input id="search" type="search" placeholder="Search 100 grocery products…" aria-label="Search products">
      <button id="cart-btn" class="cart-btn">
        Trolley
        <span id="cart-count" class="cart-count" style="display:none">0</span>
      </button>
    </div>
  </header>

  <div class="toolbar">
    <div id="chips" class="chips"></div>
    <select id="sort" aria-label="Sort products">
      <option value="featured">Featured</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="name">Name: A–Z</option>
    </select>
  </div>

  <div id="result-count" class="result-count"></div>

  <main id="grid" class="grid"></main>

  <footer>
    AussieMart demo storefront — Day 11 of #30DaysOfAIEngineering.
    All prices in AUD (GST inclusive). Fictional store; prices are indicative only.
  </footer>

  <div id="drawer-overlay" class="drawer-overlay"></div>
  <aside class="drawer" aria-label="Shopping trolley">
    <div class="drawer-header">
      <h2>Your Trolley</h2>
      <button id="close-cart" class="close-btn" aria-label="Close trolley">✕</button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div class="drawer-footer">
      <div class="total-row"><span>Total</span><span id="cart-total">$0.00</span></div>
      <div class="gst-note">Includes GST of <span id="gst-amount">$0.00</span></div>
      <button id="checkout-btn" class="checkout-btn" disabled>Checkout</button>
    </div>
  </aside>

  <script src="products.js"></script>
  <script src="app.js"></script>
  <script src="widget.js"></script>
</body>
</html>
